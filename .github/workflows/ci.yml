name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend test deps
        run: |
          python -m pip install --upgrade pip
          pip install fastapi==0.104.1 pydantic==2.5.0 python-dotenv==1.0.0
          pip install sqlalchemy==2.0.23 alembic==1.12.1 psycopg[binary]==3.1.18
          pip install pytest==7.4.3 pytest-cov==4.1.0 httpx==0.25.2

      - name: Run backend unit tests
        working-directory: backend
        run: pytest tests/test_input_processor.py tests/test_rca_engine.py -v

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
